<style>
body {
    margin: 0;
    font-family: 'Rajdhani', sans-serif;
    background: radial-gradient(circle at top, #0a0f1e, #000000);
    color: white;
}

/* TITRE */
.section-title {
    font-size: 40px;
    font-weight: 700;
    background: linear-gradient(90deg, #2bb0ed, #6c8cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* TEXTE */
.section-desc {
    color: #c9d1d9;
    margin-bottom: 30px;
}

/* SOUS TITRE */
.sub-title {
    color: #2bb0ed;
    font-size: 22px;
    margin-bottom: 20px;
}

/* GRID */
.project-grid {
    display: flex;
    gap: 25px;
}

/* CARTE */
.project-card {
    background: #0f1620;
    border-radius: 20px;
    padding: 15px;
    width: 250px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    transition: transform 0.3s;
}

.project-card:hover {
    transform: translateY(-5px);
}

/* IMAGE */
.project-card img {
    width: 100%;
    border-radius: 15px;
    cursor: pointer;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
}

.modal-content {
    display: block;
    margin: auto;
    max-width: 90%;
    max-height: 90vh;
    width: auto;
    height: auto;
    object-fit: contain; /* IMPORTANT */
}

.close {
    position: absolute;
    top: 30px;
    right: 40px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}
   </style>
   <div class="section">

    <h1 class="section-title">
        Chatbot INFOMAC (Assistant virtuel)
    </h1>

    <p class="section-desc">
        Développement d’une interface de chatbot permettant d’accompagner les utilisateurs dans leurs demandes (réparation, devis, rendez-vous).
    </p>

    <h2 class="sub-title">Interface utilisateur</h2>

    <div class="project-grid">

        <div class="project-card">
            <img src="chatbot-1.png" onclick="openModal(this.src)">
            <p>Accueil du chatbot</p>
        </div>

        <div class="project-card">
            <img src="chatbot-2.png" onclick="openModal(this.src)">
            <p>Interaction utilisateur</p>
        </div>

    </div>

</div>

<!-- MODAL -->
<div id="imgModal" class="modal">
    <span class="close" onclick="closeModal()">×</span>
    <img class="modal-content" id="modalImg">
</div>
<script>
function openModal(src) {
    document.getElementById("imgModal").style.display = "block";
    document.getElementById("modalImg").src = src;
}

function closeModal() {
    document.getElementById("imgModal").style.display = "none";
}

/* fermer en cliquant dehors */
window.onclick = function(event) {
    let modal = document.getElementById("imgModal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>
